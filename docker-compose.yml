# Local development manifest. Production-like delivery uses
# deploy/compose/docker-compose.release.yml through Semaphore/Ansible.
services:
  ute-demo-nodejs:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "${UTE_DEMO_NODEJS_DEV_PORT:-8110}:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      SESSION_COOKIE_SECURE: "false"
      TRUST_PROXY: "false"
    env_file:
      - .env
    volumes:
      - ./src:/app
      - demo_nodejs_node_modules_volume:/app/node_modules
    command: >
      sh -c "
        test -d /app/node_modules || npm install &&
        npm run watch
      "
    labels:
      - traefik.enable=true
      - traefik.http.routers.ute-demo-nodejs-dev.entrypoints=https
      - traefik.http.routers.ute-demo-nodejs-dev.rule=Host(`${UTE_DEMO_NODEJS_DEV_HOST:-utdn.order.home.under-tree-e.com}`)
      - traefik.http.routers.ute-demo-nodejs-dev.tls=true
      - traefik.http.services.ute-demo-nodejs-dev.loadbalancer.server.port=3000
    networks:
      - dev_network

volumes:
  demo_nodejs_node_modules_volume:
    name: demo_nodejs_node_modules_volume

networks:
  dev_network:
    external: true
    name: ${UTE_DEMO_NODEJS_DEV_TRAEFIK_NETWORK:-dev_network}
