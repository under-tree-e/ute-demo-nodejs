services:
  ute-demo-nodejs:
    image: ${UTE_IMAGE_REF:?UTE_IMAGE_REF must be an immutable GHCR digest}
    restart: unless-stopped
    env_file:
      - ${UTE_RUNTIME_ENV_FILE:?UTE_RUNTIME_ENV_FILE must point to the Vault Agent rendered file}
    read_only: true
    tmpfs:
      - /tmp:mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    labels:
      - traefik.enable=true
      - traefik.http.routers.ute-demo-nodejs.entrypoints=https
      - traefik.http.routers.ute-demo-nodejs.rule=Host(`${UTE_PUBLIC_HOST:?UTE_PUBLIC_HOST is required}`)
      - traefik.http.routers.ute-demo-nodejs.tls=true
      - traefik.http.services.ute-demo-nodejs.loadbalancer.server.port=3000
    networks:
      - proxy

networks:
  proxy:
    external: true
    name: ${UTE_TRAEFIK_NETWORK:?UTE_TRAEFIK_NETWORK is required}
